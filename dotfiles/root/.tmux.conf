set -g mouse on

# tmux-256color + RGB: avoids broken Powerline / p10k separators (often shown as "_" or "/") vs screen-256color.
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -ga terminal-overrides ",*256col*:Tc"

# New panes/windows must use zsh so ~/.zshrc (Oh My Zsh) runs. Docker root often has /bin/bash in passwd.
set-environment -g SHELL /usr/bin/zsh
set -g default-shell /usr/bin/zsh
set -g default-command "zsh -l"

set -g @plugin 'erikw/tmux-powerline'

# TPM (keep at the bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
