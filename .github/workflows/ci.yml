name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  image-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        ubuntu_version:
          - "22.04"
          - "24.04"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
        with:
          driver: docker

      - name: Build image for smoke tests
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build \
            --load \
            --build-arg UBUNTU_VERSION="${{ matrix.ubuntu_version }}" \
            -t "local/ubuntu-development:${{ matrix.ubuntu_version }}" \
            .

      - name: Run smoke tests
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm "local/ubuntu-development:${{ matrix.ubuntu_version }}" bash -lc '
            bash --version >/dev/null &&
            git --version >/dev/null &&
            curl --version >/dev/null &&
            just --version >/dev/null &&
            bats --version >/dev/null
          '

      - name: Smoke test summary
        if: success()
        run: |
          {
            echo "### Smoke test (Ubuntu ${{ matrix.ubuntu_version }})"
            echo ""
            echo "Docker image built and smoke checks passed for **${{ matrix.ubuntu_version }}**."
          } >> "${GITHUB_STEP_SUMMARY}"

  vulnerability-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Build image for scan
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            --build-arg UBUNTU_VERSION="24.04" \
            -t "local/ubuntu-development:scan" \
            .

      - name: Scan image with Trivy
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.64.1 image \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            --no-progress \
            "local/ubuntu-development:scan"

      - name: Vulnerability scan summary
        if: success()
        run: |
          {
            echo "### Vulnerability scan (Trivy)"
            echo ""
            echo "Scanned \`local/ubuntu-development:scan\` (HIGH/CRITICAL, \`--exit-code 0\`)."
          } >> "${GITHUB_STEP_SUMMARY}"
