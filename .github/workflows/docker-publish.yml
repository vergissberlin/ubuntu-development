name: docker-publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: vergissberlin/ubuntu-development
  DEFAULT_UBUNTU_VERSION: "24.04"

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ubuntu_version:
          - "22.04"
          - "24.04"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.ubuntu_version }}
            type=raw,value=${{ matrix.ubuntu_version }}-{{sha}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            UBUNTU_VERSION=${{ matrix.ubuntu_version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  latest:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish latest alias for default Ubuntu version
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            UBUNTU_VERSION=${{ env.DEFAULT_UBUNTU_VERSION }}
          tags: ${{ env.IMAGE_NAME }}:latest
