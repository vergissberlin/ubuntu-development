name: docker-publish

on:
  push:
    branches:
      - main
    tags:
      - "*.*.*"
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

env:
  IMAGE_NAME: vergissberlin/ubuntu-development
  GHCR_IMAGE_NAME: ghcr.io/${{ github.repository }}
  DEFAULT_UBUNTU_VERSION: "24.04"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        ubuntu_version:
          - "22.04"
          - "24.04"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release semver tag
        id: semver
        shell: bash
        run: |
          set -euo pipefail
          semver_tag=""
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" =~ ^([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            semver_tag="${BASH_REMATCH[1]}"
          fi
          echo "semver_tag=${semver_tag}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Log in to Docker Hub (with retry)
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Docker Hub login attempt ${attempt}/3"
            if echo "${DOCKERHUB_TOKEN}" | docker login --username "${DOCKERHUB_USERNAME}" --password-stdin; then
              exit 0
            fi
            sleep $((attempt * 10))
          done
          echo "Docker Hub login failed after 3 attempts"
          exit 1

      - name: Log in to GHCR (with retry)
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "GHCR login attempt ${attempt}/3"
            if echo "${GHCR_TOKEN}" | docker login ghcr.io --username "${GHCR_USERNAME}" --password-stdin; then
              exit 0
            fi
            sleep $((attempt * 10))
          done
          echo "GHCR login failed after 3 attempts"
          exit 1

      - name: Build and push (with retry)
        shell: bash
        run: |
          set -euo pipefail
          tags=(
            "-t" "${{ env.IMAGE_NAME }}:${{ matrix.ubuntu_version }}"
            "-t" "${{ env.GHCR_IMAGE_NAME }}:${{ matrix.ubuntu_version }}"
          )
          if [[ "${{ steps.semver.outputs.semver_tag }}" != "" && "${{ matrix.ubuntu_version }}" == "${{ env.DEFAULT_UBUNTU_VERSION }}" ]]; then
            tags+=("-t" "${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.semver_tag }}")
            tags+=("-t" "${{ env.GHCR_IMAGE_NAME }}:${{ steps.semver.outputs.semver_tag }}")
          fi
          for attempt in 1 2 3; do
            echo "Build attempt ${attempt}/3"
            if docker buildx build \
              --push \
              --build-arg UBUNTU_VERSION="${{ matrix.ubuntu_version }}" \
              --label "org.opencontainers.image.revision=${{ github.sha }}" \
              "${tags[@]}" \
              .; then
              exit 0
            fi
            sleep $((attempt * 15))
          done
          echo "Build failed after 3 attempts"
          exit 1

  latest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Log in to Docker Hub (with retry)
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Docker Hub login attempt ${attempt}/3"
            if echo "${DOCKERHUB_TOKEN}" | docker login --username "${DOCKERHUB_USERNAME}" --password-stdin; then
              exit 0
            fi
            sleep $((attempt * 10))
          done
          echo "Docker Hub login failed after 3 attempts"
          exit 1

      - name: Log in to GHCR (with retry)
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "GHCR login attempt ${attempt}/3"
            if echo "${GHCR_TOKEN}" | docker login ghcr.io --username "${GHCR_USERNAME}" --password-stdin; then
              exit 0
            fi
            sleep $((attempt * 10))
          done
          echo "GHCR login failed after 3 attempts"
          exit 1

      - name: Publish latest alias for default Ubuntu version
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Latest attempt ${attempt}/3"
            if docker buildx build \
              --push \
              --build-arg UBUNTU_VERSION="${{ env.DEFAULT_UBUNTU_VERSION }}" \
              -t "${{ env.IMAGE_NAME }}:latest" \
              -t "${{ env.GHCR_IMAGE_NAME }}:latest" \
              .; then
              exit 0
            fi
            sleep $((attempt * 15))
          done
          echo "Latest publish failed after 3 attempts"
          exit 1
